services:
  portfolio:
    image: ghcr.io/fathanemha/portfolio-tatan:latest
    container_name: portfolio-tatan
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy-tier

networks:
  proxy-tier:
    external: true
