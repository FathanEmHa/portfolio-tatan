server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers -------------------------------------------------------
    # These are lightweight additions; your NPM instance can also add these.
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # --- Aggressive caching for hashed static assets ----------------------------
    # Vite appends content hashes to JS/CSS/image filenames (e.g. main.a1b2c3.js),
    # so it is safe to cache them indefinitely in the browser.
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- SPA fallback -----------------------------------------------------------
    # Any path that is not a real file is served as index.html so that the
    # React Router (or any client-side router) can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Gzip compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Hide Nginx version from responses --------------------------------------
    server_tokens off;
}